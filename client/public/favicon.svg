<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Stock money portfolio icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="48" fill="url(#bgGrad)"/>

  <!-- Portfolio briefcase -->
  <g filter="url(#shadow)">
    <rect x="96" y="236" width="320" height="180" rx="22" fill="#334155" stroke="#94a3b8" stroke-width="6"/>
    <rect x="210" y="202" width="92" height="34" rx="10" fill="#475569" stroke="#94a3b8" stroke-width="5"/>
    <line x1="96" y1="320" x2="416" y2="320" stroke="#64748b" stroke-width="5"/>
    <rect x="238" y="307" width="36" height="26" rx="6" fill="#0ea5e9"/>
  </g>

  <!-- Money coin -->
  <g filter="url(#shadow)">
    <circle cx="132" cy="168" r="56" fill="#facc15" stroke="#eab308" stroke-width="8"/>
    <text x="132" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#92400e">$</text>
  </g>

  <!-- Stock chart panel -->
  <g filter="url(#shadow)">
    <rect x="220" y="86" width="212" height="136" rx="16" fill="#0b1220" stroke="#334155" stroke-width="5"/>
    <line x1="242" y1="198" x2="410" y2="198" stroke="#1f2937" stroke-width="3"/>
    <line x1="242" y1="170" x2="410" y2="170" stroke="#1f2937" stroke-width="3"/>
    <line x1="242" y1="142" x2="410" y2="142" stroke="#1f2937" stroke-width="3"/>
    <line x1="242" y1="114" x2="410" y2="114" stroke="#1f2937" stroke-width="3"/>

    <polyline points="246,186 276,166 302,174 332,140 360,152 392,104 410,118"
              fill="none" stroke="url(#chartGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="404,105 425,104 412,123" fill="#22c55e"/>
  </g>
</svg>